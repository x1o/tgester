telethon:
  device_model: '...'
  system_version: '...'
  app_version: '...'
  session: 'telegram.session'

telegram:
  # Each entry is '@handle: description' (the description is fed to the model to
  # improve grouping/attribution) or just '@handle' if you have no description.
  channels:
    - '@<channel1>': 'what this channel covers'
    - '@<channel2>'
  timezone: 'Europe/Prussia'

agent:
  model: '<model_name>'  # e.g. claude-opus-4-8 (default) or claude-sonnet-4-6 for lower cost
  # max_tokens: 32000  # max digest length; raise for very busy days (Opus 4.8 supports up to 128000)
  # thinking: true     # adaptive thinking (default on); set false for faster/cheaper, less analytical digests

publishing:
  author_name: '<agents_name>'
  summary_channel: '@<announcement_channel>'
  # domain: 'telegra.ph'  # optional; set to 'graph.org' if telegra.ph is blocked on your network
